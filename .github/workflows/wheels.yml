name: Build and publish wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_linux:
    name: Build Linux wheel
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: python -m pip install -U pip cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_ARCHS: "x86_64"
          CIBW_BEFORE_BUILD: "cd src && make clean && make OPT=-O2"
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build_macos_x86_64:
    name: Build macOS x86_64 wheel
    runs-on: macos-15-intel
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: python -m pip install -U pip cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_ARCHS: "x86_64"
          CIBW_BEFORE_BUILD: "cd src && make clean && make OPT=-O1"
          # Set the deployment target to match cibuildwheel's default
          MACOSX_DEPLOYMENT_TARGET: "10.9"
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: wheelhouse/*.whl

  build_macos_arm64:
    name: Build macOS arm64 wheel
    runs-on: macos-14 # This runner is Apple Silicon-based
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: python -m pip install -U pip cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_ARCHS: "arm64"
          CIBW_BEFORE_BUILD: "cd src && make clean && make OPT=-O1"
          # Set the deployment target to match cibuildwheel's default
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_linux, build_macos_x86_64, build_macos_arm64, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheelhouse
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: wheelhouse
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse

